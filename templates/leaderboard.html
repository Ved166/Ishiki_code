{% extends "base.html" %}
{% block title %}Leaderboard{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-trophy"></i> Leaderboard</h2>
<div class="table-responsive">
    <table class="table table-dark table-striped table-hover">
        <thead><tr><th>#</th><th>User</th><th>XP</th><th>Streak</th></tr></thead>
        <tbody>
            {% for u in users %}
            <tr {% if current_user.is_authenticated and u.id == current_user.id %}class="table-info"{% endif %}>
                <td>{{ loop.index }}</td>
                <td>{{ u.username }}{% if u.role == 'admin' %} <span class="badge bg-warning text-dark">Admin</span>{% endif %}</td>
                <td class="text-info fw-bold">{{ u.xp or 0 }}</td>
                <td>{{ u.learning_streak or 0 }} days</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
