{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<h2 class="mb-4">Profile Management</h2>
<div class="row g-4">
    <div class="col-md-6">
        <div class="card bg-dark border-secondary">
            <div class="card-header">Account Info</div>
            <div class="card-body">
                <p><strong>Username:</strong> {{ current_user.username }}</p>
                <p><strong>Role:</strong> {{ current_user.role }}</p>
                <p><strong>XP:</strong> {{ current_user.xp or 0 }}</p>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ current_user.email }}" required>
                    </div>
                    <button type="submit" class="btn btn-info">Save Email</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card bg-dark border-secondary">
            <div class="card-header">Change Password</div>
            <div class="card-body">
                <form method="post">
                    <input type="hidden" name="email" value="{{ current_user.email }}">
                    <div class="mb-3">
                        <label class="form-label">Current Password</label>
                        <input type="password" name="current_password" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password" name="new_password" class="form-control" minlength="6">
                    </div>
                    <button type="submit" class="btn btn-warning">Change Password</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
