{% extends "base.html" %}
{% block title %}Admin Reports{% endblock %}
{% block content %}
<h2 class="mb-4">Incident Reports</h2>
{% for r in reports %}
<div class="card bg-dark border-secondary mb-3">
    <div class="card-header d-flex justify-content-between">
        <span>{{ r.report_type }} — {{ r.user.username }}</span>
        <span class="badge bg-secondary">{{ r.status }}</span>
    </div>
    <div class="card-body">
        <p>{{ r.description }}</p>
        <small class="text-muted">{{ r.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
        <form method="post" action="{{ url_for('admin.update_report_status', report_id=r.id) }}" class="mt-2">
            <select name="status" class="form-select form-select-sm d-inline-block w-auto">
                <option value="pending">Pending</option>
                <option value="reviewed">Reviewed</option>
                <option value="resolved">Resolved</option>
            </select>
            <button class="btn btn-sm btn-info">Update</button>
        </form>
    </div>
</div>
{% endfor %}
{% endblock %}
