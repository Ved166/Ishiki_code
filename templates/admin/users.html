{% extends "base.html" %}
{% block title %}Manage Users{% endblock %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h2>Users</h2>
    <a href="{{ url_for('admin.add_user') }}" class="btn btn-info btn-sm">Add User</a>
</div>
<table class="table table-dark table-striped">
    <thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>XP</th><th></th></tr></thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.id }}</td><td>{{ u.username }}</td><td>{{ u.email }}</td><td>{{ u.role }}</td><td>{{ u.xp or 0 }}</td>
            <td>
                <a href="{{ url_for('admin.edit_user', user_id=u.id) }}" class="btn btn-sm btn-outline-warning">Edit</a>
                <form method="post" action="{{ url_for('admin.delete_user', user_id=u.id) }}" class="d-inline" onsubmit="return confirm('Delete?')">
                    <button class="btn btn-sm btn-outline-danger">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
<a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">Back</a>
{% endblock %}
