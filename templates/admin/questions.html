{% extends "base.html" %}
{% block title %}Questions{% endblock %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h2>Questions: {{ quiz.title }}</h2>
    <a href="{{ url_for('admin.add_question', quiz_id=quiz.id) }}" class="btn btn-info btn-sm">Add Question</a>
</div>
{% for q in questions %}
<div class="card bg-dark border-secondary mb-2">
    <div class="card-body">
        <p>{{ q.question }}</p>
        <small class="text-muted">Answer: {{ q.correct_answer }}</small>
        <div class="mt-2">
            <a href="{{ url_for('admin.edit_question', question_id=q.id) }}" class="btn btn-sm btn-outline-warning">Edit</a>
            <form method="post" action="{{ url_for('admin.delete_question', question_id=q.id) }}" class="d-inline" onsubmit="return confirm('Delete?')">
                <button class="btn btn-sm btn-outline-danger">Delete</button>
            </form>
        </div>
    </div>
</div>
{% endfor %}
{% endblock %}
