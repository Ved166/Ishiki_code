{% extends "base.html" %}
{% block title %}Quizzes{% endblock %}
{% block content %}
<h2>Quizzes</h2>
<table class="table table-dark table-striped">
    <thead><tr><th>Title</th><th>Module</th><th></th></tr></thead>
    <tbody>
        {% for q in quizzes %}
        <tr>
            <td>{{ q.title }}</td>
            <td>{{ q.module.title if q.module else '—' }}</td>
            <td><a href="{{ url_for('admin.quiz_questions', quiz_id=q.id) }}" class="btn btn-sm btn-info">Questions</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
