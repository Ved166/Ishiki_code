{% extends "base.html" %}
{% block title %}Website Simulation{% endblock %}
{% block content %}
<p class="text-muted">Scenario {{ index + 1 }} of {{ total }}</p>
<div class="card bg-dark border-secondary" id="simCard" data-type="website" data-index="{{ index }}">
    <div class="card-body text-center py-5">
        <i class="bi bi-globe display-1 text-info"></i>
        <h4 class="mt-3 font-monospace">{{ scenario.display_url }}</h4>
        <p class="text-muted small">{{ scenario.actual_note }}</p>
    </div>
    <div class="card-footer d-flex gap-2 justify-content-center">
        <button class="btn btn-success sim-answer" data-answer="safe">Safe Website</button>
        <button class="btn btn-danger sim-answer" data-answer="fake">Fake Website</button>
        <a href="{{ url_for('simulation.website_simulation', n=index+1) }}" class="btn btn-outline-secondary">Next</a>
    </div>
</div>
<div id="simFeedback" class="mt-3"></div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/simulation.js') }}"></script>
{% endblock %}
