{% extends "base.html" %}
{% block title %}Simulations{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-controller"></i> Phishing Simulations</h2>
<div class="row g-4">
    <div class="col-md-6">
        <div class="card bg-dark border-secondary h-100">
            <div class="card-body">
                <h5>Email Scenarios</h5>
                <p class="text-muted">Decide if each email is Safe or Phishing.</p>
                <a href="{{ url_for('simulation.email_simulation') }}" class="btn btn-danger">Start Email Sim</a>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card bg-dark border-secondary h-100">
            <div class="card-body">
                <h5>Website Scenarios</h5>
                <p class="text-muted">Identify fake vs safe websites.</p>
                <a href="{{ url_for('simulation.website_simulation') }}" class="btn btn-warning">Start Website Sim</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
