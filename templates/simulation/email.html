{% extends "base.html" %}
{% block title %}Email Simulation{% endblock %}
{% block content %}
<p class="text-muted">Scenario {{ index + 1 }} of {{ total }}</p>
<div class="card bg-dark border-secondary" id="simCard" data-type="email" data-index="{{ index }}">
    <div class="card-header">
        <strong>From:</strong> {{ scenario.from_addr }}<br>
        <strong>Subject:</strong> {{ scenario.subject }}
    </div>
    <div class="card-body">
        <pre class="text-light mb-0" style="white-space: pre-wrap;">{{ scenario.body }}</pre>
    </div>
    <div class="card-footer d-flex gap-2">
        <button class="btn btn-success sim-answer" data-answer="safe">Safe</button>
        <button class="btn btn-danger sim-answer" data-answer="phishing">Phishing</button>
        <a href="{{ url_for('simulation.email_simulation', n=index+1) }}" class="btn btn-outline-secondary ms-auto">Next</a>
    </div>
</div>
<div id="simFeedback" class="mt-3"></div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/simulation.js') }}"></script>
{% endblock %}
